# Fly.io config for production Spring Boot API app.
# App: church-registry-api
# Pre Postgres: uses staging DB. Post Postgres: switch secrets to prod DB.
#
# Create app once: fly apps create church-registry-api --org YOUR_ORG
#
# For distributed dioceses/parishes cache (multi-instance): create Redis and set secret:
#   fly redis create
#   fly secrets set REDIS_URL="redis://default:...@...upstash.io:6379"

app = "church-registry-api"
primary_region = "jnb"  # Johannesburg - closest to Nigeria

[vm]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024

# Explicit command ensures we bind to 0.0.0.0 (required for Fly proxy).
# Use literal 8080: ${PORT} is not reliably expanded in [processes] on Machines, which can prevent the JVM from starting.
[processes]
  app = "java -Dserver.port=8080 -Dserver.address=0.0.0.0 -jar /app/app.jar"

[env]
  PORT = "8080"
  SPRING_PROFILES_ACTIVE = "prod"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 50
    soft_limit = 40

  [[http_service.checks]]
    grace_period = "300s"
    interval = "15s"
    method = "GET"
    path = "/api/health"
    timeout = "5s"
