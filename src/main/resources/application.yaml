server:
  error:
    include-message: always

spring:
  mail:
    host: ${SMTP_HOST:mail.privateemail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SMTP_AUTH:true}
          starttls:
            enable: ${SMTP_STARTTLS_ENABLE:true}
            required: ${SMTP_STARTTLS_REQUIRED:true}
  data:
    web:
      pageable:
        max-page-size: 100
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

# OpenAPI: Swagger UI at /swagger-ui.html, JSON at /v3/api-docs
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  cors:
    # Allowed origins for CORS (comma-separated). Default: Next.js dev server
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-use-at-least-256-bits}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}
  refresh-token:
    # Cron for expired refresh token cleanup (default: hourly at minute 0)
    cleanup-cron: ${REFRESH_TOKEN_CLEANUP_CRON:0 0 * * * ?}
  invitation:
    accept-base-url: ${APP_INVITATION_ACCEPT_BASE_URL:http://localhost:3000/accept-invite}
    email:
      from: ${APP_INVITATION_EMAIL_FROM:onboarding@sacramentregistry.com}
      allowed-domain: ${APP_INVITATION_EMAIL_ALLOWED_DOMAIN:sacramentregistry.com}
  user-invitation:
    resend-cooldown-ms: ${APP_USER_INVITATION_RESEND_COOLDOWN_MS:900000}
    expose-token-in-response: ${APP_USER_INVITATION_EXPOSE_TOKEN_IN_RESPONSE:false}
  rate-limit:
    login:
      limit: 5
      period-minutes: 15
    refresh:
      limit: 15
      period-minutes: 1
    api:
      limit: 300
      period-minutes: 1
  sentry-test-endpoint:
    enabled: ${SENTRY_TEST_ENDPOINT_ENABLED:false}
    key: ${SENTRY_TEST_ENDPOINT_KEY:}

sentry:
  dsn: ${SENTRY_DSN:}
  environment: ${SENTRY_ENVIRONMENT:${SPRING_PROFILES_ACTIVE:local}}
  release: ${SENTRY_RELEASE:church-registry-api@local}
  send-default-pii: false
  traces-sample-rate: ${SENTRY_TRACES_SAMPLE_RATE:0.0}

