databaseChangeLog:
  - changeSet:
      id: 1
      author: will_okanumeh
      changes:
        - addColumn:
            tableName: diocese
            columns:
              - column:
                  name: country_code
                  type: varchar(2)
                  constraints:
                    nullable: true
              - column:
                  name: country_name
                  type: varchar(100)
                  constraints:
                    nullable: true
              - column:
                  name: ordinary_name
                  type: varchar(255)
                  constraints:
                    nullable: true
              - column:
                  name: ordinary_title
                  type: varchar(100)
                  constraints:
                    nullable: true
        - createIndex:
            indexName: idx_diocese_country_code
            tableName: diocese
            columns:
              - column:
                  name: country_code
        - createIndex:
            indexName: idx_diocese_country_code_diocese_name
            tableName: diocese
            columns:
              - column:
                  name: country_code
              - column:
                  name: diocese_name

  - changeSet:
      id: 2
      author: will_okanumeh
      preConditions:
        - onFail: MARK_RAN
        - dbms:
            type: postgresql
      changes:
        - sql:
            sql: |
              DROP INDEX IF EXISTS uidx_diocese_normalized_name;

              CREATE UNIQUE INDEX IF NOT EXISTS uidx_diocese_country_normalized_name
                ON diocese (country_code, LOWER(BTRIM(diocese_name)))
                WHERE country_code IS NOT NULL;

