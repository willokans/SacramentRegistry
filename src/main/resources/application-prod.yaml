server:
  address: 0.0.0.0  # Required for Fly.io: listen on all interfaces
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain

# Disable Swagger UI and API docs in production (security: avoid exposing API structure)
springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false

spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
  mail:
    host: ${SMTP_HOST}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME}
    password: ${SMTP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: ${SMTP_AUTH:true}
          starttls:
            enable: ${SMTP_STARTTLS_ENABLE:true}
            required: ${SMTP_STARTTLS_REQUIRED:true}
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10   # Tuned for Fly.io 1GB VM
      minimum-idle: 2
      data-source-properties:
        preferQueryMode: simple
        prepareThreshold: 0
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

app:
  rls:
    enabled: true  # RLS session vars for tenant isolation (Postgres)
  invitation:
    accept-base-url: ${APP_INVITATION_ACCEPT_BASE_URL}
    email:
      from: ${APP_INVITATION_EMAIL_FROM:onboarding@sacramentregistry.com}
      allowed-domain: ${APP_INVITATION_EMAIL_ALLOWED_DOMAIN:sacramentregistry.com}
      support: ${APP_INVITATION_EMAIL_SUPPORT:support@sacramentregistry.com}
  password-reset:
    public-base-url: ${APP_PASSWORD_RESET_PUBLIC_BASE_URL}
    email:
      from: ${APP_PASSWORD_RESET_EMAIL_FROM:${APP_INVITATION_EMAIL_FROM:onboarding@sacramentregistry.com}}
      support: ${APP_PASSWORD_RESET_EMAIL_SUPPORT:${APP_INVITATION_EMAIL_SUPPORT:support@sacramentregistry.com}}
  user-invitation:
    resend-cooldown-ms: ${APP_USER_INVITATION_RESEND_COOLDOWN_MS:900000}
    expose-token-in-response: false
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}
