# Certificate upload (Holy Communion, Baptism from another parish) requires:
# SUPABASE_SERVICE_ROLE_KEY — from Supabase Dashboard → Project Settings → API
# (SUPABASE_URL or NEXT_PUBLIC_SUPABASE_URL optional; inferred from datasource username if postgres.xxx)
spring:
  mail:
    host: ${SMTP_HOST:mail.privateemail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SMTP_AUTH:true}
          starttls:
            enable: ${SMTP_STARTTLS_ENABLE:true}
            required: ${SMTP_STARTTLS_REQUIRED:true}
  datasource:
    # prepareThreshold=0 and preferQueryMode=simple avoid "prepared statement already exists" with Supabase pooler (PgBouncer)
    url: jdbc:postgresql://aws-1-eu-west-1.pooler.supabase.com:6543/postgres?sslmode=require&preferQueryMode=simple&prepareThreshold=0
    username: postgres.rxaepykghapdwgonvlvi
    password: ${LOCAL_PG_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

app:
  rls:
    enabled: true  # Enable RLS session vars for tenant isolation (Postgres only)
  invitation:
    accept-base-url: ${APP_INVITATION_ACCEPT_BASE_URL:http://localhost:3000/accept-invite}
    email:
      from: ${APP_INVITATION_EMAIL_FROM:onboarding@sacramentregistry.com}
      allowed-domain: ${APP_INVITATION_EMAIL_ALLOWED_DOMAIN:sacramentregistry.com}
      support: ${APP_INVITATION_EMAIL_SUPPORT:support@sacramentregistry.com}
  password-reset:
    public-base-url: ${APP_PASSWORD_RESET_PUBLIC_BASE_URL:http://localhost:3000}
    email:
      from: ${APP_PASSWORD_RESET_EMAIL_FROM:${APP_INVITATION_EMAIL_FROM:onboarding@sacramentregistry.com}}
      support: ${APP_PASSWORD_RESET_EMAIL_SUPPORT:${APP_INVITATION_EMAIL_SUPPORT:support@sacramentregistry.com}}
  user-invitation:
    resend-cooldown-ms: ${APP_USER_INVITATION_RESEND_COOLDOWN_MS:900000}
    expose-token-in-response: ${APP_USER_INVITATION_EXPOSE_TOKEN_IN_RESPONSE:true}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  jwt:
    secret: ${JWT_SECRET:change-me-in-local-postgres}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}
