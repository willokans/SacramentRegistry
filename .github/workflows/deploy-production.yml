name: Deploy to Production

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "pom.xml"
      - "Dockerfile"
      - "fly.api.toml"
      - "fly.api.prod.toml"
      - "frontend/**"
      - "frontend/fly.prod.toml"
      - ".github/workflows/deploy-production.yml"
  workflow_dispatch:

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run backend tests
        run: mvn -B test

      - name: Install Fly CLI
        run: |
          curl -L https://fly.io/install.sh | sh -s -- --non-interactive
          echo "$HOME/.fly/bin" >> $GITHUB_PATH

      - name: Validate production org
        env:
          FLY_ORG: ${{ vars.FLY_ORG }}
          FLY_ORG_PROD: ${{ secrets.FLY_ORG_PROD }}
        run: |
          ORG="$(printf '%s' "${FLY_ORG_PROD:-$FLY_ORG}" | tr -d '[:space:]')"
          if [ -z "${ORG:-}" ]; then
            echo "::error::FLY_ORG_PROD or FLY_ORG must be set. Add secret: Settings → Secrets and variables → Actions → Secrets → FLY_ORG_PROD = wyloks-166 (use 'fly orgs list' for your slug)"
            exit 1
          fi
          echo "Using Fly org (slug length: ${#ORG})"

      - name: Ensure Fly API app exists
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_PROD || secrets.FLY_API_TOKEN }}
          FLY_ACCESS_TOKEN: ${{ secrets.FLY_API_TOKEN_PROD || secrets.FLY_API_TOKEN }}
          FLY_ORG: ${{ vars.FLY_ORG }}
          FLY_ORG_PROD: ${{ secrets.FLY_ORG_PROD }}
        run: |
          set -euo pipefail
          APP_NAME="church-registry-api"
          ORG="$(printf '%s' "${FLY_ORG_PROD:-$FLY_ORG}" | tr -d '[:space:]')"
          ORG_ARG=""
          [ -n "${ORG:-}" ] && ORG_ARG="--org $ORG"
          if ! flyctl apps show "$APP_NAME" $ORG_ARG >/dev/null 2>&1; then
            if [ -n "${ORG:-}" ]; then
              flyctl apps create "$APP_NAME" --org "$ORG" || true
            else
              flyctl apps create "$APP_NAME" || true
            fi
            # "Name has already been taken" = app exists; continue to deploy
          fi

      - name: Sync API secrets
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_PROD || secrets.FLY_API_TOKEN }}
          FLY_ACCESS_TOKEN: ${{ secrets.FLY_API_TOKEN_PROD || secrets.FLY_API_TOKEN }}
          FLY_ORG: ${{ vars.FLY_ORG }}
          FLY_ORG_PROD: ${{ secrets.FLY_ORG_PROD }}
          API_DATABASE_URL_PROD: ${{ secrets.API_DATABASE_URL_PROD }}
          API_DATABASE_USERNAME_PROD: ${{ secrets.API_DATABASE_USERNAME_PROD }}
          API_DATABASE_PASSWORD_PROD: ${{ secrets.API_DATABASE_PASSWORD_PROD }}
          API_JWT_SECRET_PROD: ${{ secrets.API_JWT_SECRET_PROD }}
          API_CORS_ALLOWED_ORIGINS_PROD: ${{ secrets.API_CORS_ALLOWED_ORIGINS_PROD }}
          API_JWT_EXPIRATION_MS_PROD: ${{ secrets.API_JWT_EXPIRATION_MS_PROD }}
          API_JWT_REFRESH_EXPIRATION_MS_PROD: ${{ secrets.API_JWT_REFRESH_EXPIRATION_MS_PROD }}
          SUPABASE_SERVICE_ROLE_KEY_PROD: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY_PROD }}
          SUPABASE_URL_PROD: ${{ secrets.SUPABASE_URL_PROD }}
          API_SENTRY_DSN_PROD: ${{ secrets.API_SENTRY_DSN_PROD }}
          SENTRY_RELEASE_PROD: ${{ secrets.SENTRY_RELEASE_PROD }}
        run: |
          set -euo pipefail
          APP_NAME="church-registry-api"

          # Pre Postgres: use staging credentials. Post Postgres: use prod credentials.
          # All _PROD secrets must be set in GitHub (copy from staging for Pre Postgres).
          required=(API_DATABASE_URL_PROD API_DATABASE_USERNAME_PROD API_DATABASE_PASSWORD_PROD API_JWT_SECRET_PROD API_CORS_ALLOWED_ORIGINS_PROD SUPABASE_SERVICE_ROLE_KEY_PROD)
          for key in "${required[@]}"; do
            if [ -z "${!key:-}" ]; then
              echo "Missing required GitHub secret: $key"
              exit 1
            fi
          done

          # Validate JDBC URL format (port optional; JDBC allows default 5432)
          API_DATABASE_URL_PROD="$(printf '%s' "$API_DATABASE_URL_PROD" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          if ! printf '%s' "$API_DATABASE_URL_PROD" | grep -qE '^jdbc:postgresql://[^/]+/'; then
            echo "ERROR: API_DATABASE_URL_PROD must be a full JDBC URL, e.g.:"
            echo "  jdbc:postgresql://aws-1-eu-west-1.pooler.supabase.com:6543/postgres?sslmode=require&preferQueryMode=simple&prepareThreshold=0"
            echo "  (with or without an explicit :port before /database)"
            exit 1
          fi

          # Temp file (not `{ } | flyctl`) so optional SUPABASE_URL does not make `[ -n ... ] &&` exit 1 under pipefail
          SECRETS_IMPORT="$(mktemp)"
          trap 'rm -f "$SECRETS_IMPORT"' EXIT
          {
            printf 'SPRING_DATASOURCE_URL=%s\n' "$API_DATABASE_URL_PROD"
            printf 'SPRING_DATASOURCE_USERNAME=%s\n' "$API_DATABASE_USERNAME_PROD"
            printf 'SPRING_DATASOURCE_PASSWORD=%s\n' "$API_DATABASE_PASSWORD_PROD"
            printf 'JWT_SECRET=%s\n' "$API_JWT_SECRET_PROD"
            printf 'CORS_ALLOWED_ORIGINS=%s\n' "$API_CORS_ALLOWED_ORIGINS_PROD"
            printf 'JWT_EXPIRATION_MS=%s\n' "${API_JWT_EXPIRATION_MS_PROD:-3600000}"
            printf 'JWT_REFRESH_EXPIRATION_MS=%s\n' "${API_JWT_REFRESH_EXPIRATION_MS_PROD:-604800000}"
            printf 'SUPABASE_SERVICE_ROLE_KEY=%s\n' "$SUPABASE_SERVICE_ROLE_KEY_PROD"
            printf 'SENTRY_ENVIRONMENT=%s\n' "production"
            printf 'SENTRY_RELEASE=%s\n' "${SENTRY_RELEASE_PROD:-$GITHUB_SHA}"
            if [ -n "${API_SENTRY_DSN_PROD:-}" ]; then
              printf 'SENTRY_DSN=%s\n' "$(printf '%s' "$API_SENTRY_DSN_PROD" | tr -d '\n')"
            fi
            if [ -n "${SUPABASE_URL_PROD:-}" ]; then
              printf 'SUPABASE_URL=%s\n' "$(printf '%s' "$SUPABASE_URL_PROD" | tr -d '\n')"
            fi
          } > "$SECRETS_IMPORT"
          flyctl secrets import --stage --app "$APP_NAME" < "$SECRETS_IMPORT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: Deploy API to Fly production
        id: deploy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_PROD || secrets.FLY_API_TOKEN }}
          FLY_ACCESS_TOKEN: ${{ secrets.FLY_API_TOKEN_PROD || secrets.FLY_API_TOKEN }}
        run: |
          set -euo pipefail
          # --local-only: build on GitHub runner Docker (avoids Fly remote builder CPU shortages / Depot issues)
          flyctl deploy -c fly.api.prod.toml --local-only --app church-registry-api

      - name: Show Fly logs on deploy failure
        if: failure()
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_PROD || secrets.FLY_API_TOKEN }}
          FLY_ACCESS_TOKEN: ${{ secrets.FLY_API_TOKEN_PROD || secrets.FLY_API_TOKEN }}
        run: |
          echo "=== Fly API logs (last 150 lines) - check for startup errors ==="
          flyctl logs -a church-registry-api 2>&1 | tail -150

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-api
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version-file: "frontend/.nvmrc"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Test
        working-directory: frontend
        run: npm test
        env:
          CI: true

      - name: Install Fly CLI
        run: |
          curl -L https://fly.io/install.sh | sh -s -- --non-interactive
          echo "$HOME/.fly/bin" >> $GITHUB_PATH

      - name: Ensure Fly frontend app exists
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_PROD || secrets.FLY_API_TOKEN }}
          FLY_ACCESS_TOKEN: ${{ secrets.FLY_API_TOKEN_PROD || secrets.FLY_API_TOKEN }}
          FLY_ORG: ${{ vars.FLY_ORG }}
          FLY_ORG_PROD: ${{ secrets.FLY_ORG_PROD }}
        run: |
          set -euo pipefail
          APP_NAME="church-registry"
          ORG="$(printf '%s' "${FLY_ORG_PROD:-$FLY_ORG}" | tr -d '[:space:]')"
          ORG_ARG=""
          [ -n "${ORG:-}" ] && ORG_ARG="--org $ORG"
          if ! flyctl apps show "$APP_NAME" $ORG_ARG >/dev/null 2>&1; then
            if [ -n "${ORG:-}" ]; then
              flyctl apps create "$APP_NAME" --org "$ORG" || true
            else
              flyctl apps create "$APP_NAME" || true
            fi
            # "Name has already been taken" = app exists; continue to deploy
          fi

      - name: Sync frontend runtime env
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_PROD || secrets.FLY_API_TOKEN }}
          FLY_ACCESS_TOKEN: ${{ secrets.FLY_API_TOKEN_PROD || secrets.FLY_API_TOKEN }}
          NEXT_PUBLIC_API_URL_PROD: ${{ secrets.NEXT_PUBLIC_API_URL_PROD }}
          # Same project URL for all; repo variable is public URL (optional)
          NEXT_PUBLIC_SUPABASE_URL_PROD: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL_PROD || secrets.NEXT_PUBLIC_SUPABASE_URL || secrets.SUPABASE_URL_PROD || vars.NEXT_PUBLIC_SUPABASE_URL }}
          API_DATABASE_USERNAME_PROD: ${{ secrets.API_DATABASE_USERNAME_PROD }}
          SUPABASE_SERVICE_ROLE_KEY_PROD: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY_PROD }}
          WEB_SENTRY_DSN_PROD: ${{ secrets.WEB_SENTRY_DSN_PROD }}
          SENTRY_RELEASE_PROD: ${{ secrets.SENTRY_RELEASE_PROD }}
          ENABLE_SENTRY_TEST_PAGE_PROD: ${{ secrets.ENABLE_SENTRY_TEST_PAGE_PROD }}
        run: |
          set -euo pipefail
          FRONTEND_API_URL="${NEXT_PUBLIC_API_URL_PROD:-https://church-registry-api.fly.dev}"

          # Resolve Supabase project URL: explicit secrets/vars, else derive postgres.<ref> → https://<ref>.supabase.co (same project as JDBC)
          SUPABASE_URL_RESOLVED="${NEXT_PUBLIC_SUPABASE_URL_PROD:-}"
          if [ -z "$SUPABASE_URL_RESOLVED" ] && [ -n "${API_DATABASE_USERNAME_PROD:-}" ]; then
            case "$API_DATABASE_USERNAME_PROD" in
              postgres.*)
                _ref="${API_DATABASE_USERNAME_PROD#postgres.}"
                SUPABASE_URL_RESOLVED="https://${_ref}.supabase.co"
                echo "Derived NEXT_PUBLIC_SUPABASE_URL from API_DATABASE_USERNAME_PROD (postgres.<ref>)"
                ;;
            esac
          fi
          if [ -z "$SUPABASE_URL_RESOLVED" ]; then
            echo "::error::Set NEXT_PUBLIC_SUPABASE_URL_PROD or vars.NEXT_PUBLIC_SUPABASE_URL, or rely on API_DATABASE_USERNAME_PROD (postgres.<ref>) so the URL can be derived"
            exit 1
          fi
          if [ -z "${SUPABASE_SERVICE_ROLE_KEY_PROD:-}" ]; then
            echo "::error::SUPABASE_SERVICE_ROLE_KEY_PROD is required for frontend (same value as API)"
            exit 1
          fi

          # Temp file + stdin import preserves special characters in keys (e.g. JWT padding '=')
          SECRETS_IMPORT="$(mktemp)"
          trap 'rm -f "$SECRETS_IMPORT"' EXIT
          {
            printf 'NEXT_PUBLIC_API_URL=%s\n' "$(printf '%s' "$FRONTEND_API_URL" | tr -d '\n')"
            printf 'NEXT_PUBLIC_SUPABASE_URL=%s\n' "$(printf '%s' "$SUPABASE_URL_RESOLVED" | tr -d '\n')"
            printf 'SUPABASE_SERVICE_ROLE_KEY=%s\n' "$SUPABASE_SERVICE_ROLE_KEY_PROD"
            printf 'SENTRY_ENVIRONMENT=%s\n' "production"
            printf 'NEXT_PUBLIC_SENTRY_ENVIRONMENT=%s\n' "production"
            printf 'SENTRY_RELEASE=%s\n' "${SENTRY_RELEASE_PROD:-$GITHUB_SHA}"
            if [ -n "${WEB_SENTRY_DSN_PROD:-}" ]; then
              printf 'NEXT_PUBLIC_SENTRY_DSN=%s\n' "$(printf '%s' "$WEB_SENTRY_DSN_PROD" | tr -d '\n')"
              printf 'SENTRY_DSN=%s\n' "$(printf '%s' "$WEB_SENTRY_DSN_PROD" | tr -d '\n')"
            fi
            if [ -n "${ENABLE_SENTRY_TEST_PAGE_PROD:-}" ]; then
              printf 'ENABLE_SENTRY_TEST_PAGE=%s\n' "$(printf '%s' "$ENABLE_SENTRY_TEST_PAGE_PROD" | tr -d '\n')"
            fi
          } > "$SECRETS_IMPORT"
          flyctl secrets import --stage --app church-registry < "$SECRETS_IMPORT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: Deploy to Fly production
        working-directory: frontend
        run: |
          set -euo pipefail
          FRONTEND_API_URL="${NEXT_PUBLIC_API_URL_PROD:-https://church-registry-api.fly.dev}"
          flyctl deploy -c fly.prod.toml --local-only --app church-registry \
            --build-arg NEXT_PUBLIC_API_URL="$FRONTEND_API_URL" \
            --build-arg NEXT_PUBLIC_SENTRY_DSN="$(printf '%s' "${WEB_SENTRY_DSN_PROD:-}" | tr -d '\n')" \
            --build-arg NEXT_PUBLIC_SENTRY_ENVIRONMENT="production" \
            --build-arg NEXT_PUBLIC_SENTRY_RELEASE="${SENTRY_RELEASE_PROD:-$GITHUB_SHA}" \
            --build-arg NEXT_PUBLIC_SENTRY_TRACES_SAMPLE_RATE="${NEXT_PUBLIC_SENTRY_TRACES_SAMPLE_RATE_PROD:-0}" \
            --build-arg SENTRY_AUTH_TOKEN="$(printf '%s' "${WEB_SENTRY_AUTH_TOKEN_PROD:-}" | tr -d '\n')" \
            --build-arg SENTRY_ORG="${SENTRY_ORG_PROD:-httpswwwwylokscom}" \
            --build-arg SENTRY_PROJECT="${SENTRY_PROJECT_FRONTEND_PROD:-frontendsacramentregistry}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_PROD || secrets.FLY_API_TOKEN }}
          FLY_ACCESS_TOKEN: ${{ secrets.FLY_API_TOKEN_PROD || secrets.FLY_API_TOKEN }}
          NEXT_PUBLIC_API_URL_PROD: ${{ secrets.NEXT_PUBLIC_API_URL_PROD }}
          WEB_SENTRY_DSN_PROD: ${{ secrets.WEB_SENTRY_DSN_PROD }}
          SENTRY_RELEASE_PROD: ${{ secrets.SENTRY_RELEASE_PROD }}
          NEXT_PUBLIC_SENTRY_TRACES_SAMPLE_RATE_PROD: ${{ secrets.NEXT_PUBLIC_SENTRY_TRACES_SAMPLE_RATE_PROD }}
          WEB_SENTRY_AUTH_TOKEN_PROD: ${{ secrets.WEB_SENTRY_AUTH_TOKEN_PROD }}
          SENTRY_ORG_PROD: ${{ secrets.SENTRY_ORG_PROD }}
          SENTRY_PROJECT_FRONTEND_PROD: ${{ secrets.SENTRY_PROJECT_FRONTEND_PROD }}
